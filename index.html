<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OneJourney — Your intelligent multimodal commute planner. Plan, book, and track journeys across Metro, Bus, Auto, and Cab with personalized Commute DNA." />
    <meta name="theme-color" content="#4f46e5" />
    <title>OneJourney — Smart Multimodal Commute Planner</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(err => console.log('PWA ServiceWorker registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
